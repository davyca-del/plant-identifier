<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Plant Identifier</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0f0a; min-height: 100vh; font-family: 'DM Mono', monospace; color: #c8d8c0; }
    .app { min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px 60px; background: radial-gradient(ellipse at 20% 0%, rgba(34,80,40,0.35) 0%, transparent 60%), radial-gradient(ellipse at 80% 100%, rgba(20,60,30,0.3) 0%, transparent 60%), #0a0f0a; }
    .app::before { content: ''; position: fixed; inset: 0; background-image: repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(120,180,100,0.03) 40px), repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(120,180,100,0.03) 40px); pointer-events: none; z-index: 0; }
    .header { text-align: center; margin-bottom: 40px; position: relative; z-index: 1; }
    .header-label { font-size: 10px; letter-spacing: 0.4em; text-transform: uppercase; color: #4a7a50; margin-bottom: 12px; }
    .header h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.2rem, 8vw, 3.4rem); font-weight: 400; color: #e8f0e0; line-height: 1.1; letter-spacing: -0.02em; }
    .header h1 em { font-style: italic; color: #7ab870; }
    .header-sub { margin-top: 12px; font-size: 11px; color: #4a6050; letter-spacing: 0.15em; }
    .main-card { width: 100%; max-width: 520px; position: relative; z-index: 1; }
    .camera-zone { width: 100%; aspect-ratio: 4/3; border: 1px solid rgba(120,180,100,0.2); border-radius: 4px; overflow: hidden; position: relative; background: #060d06; }
    .corner { position: absolute; width: 20px; height: 20px; z-index: 11; pointer-events: none; }
    .corner-tl { top: 10px; left: 10px; border-top: 1.5px solid #7ab870; border-left: 1.5px solid #7ab870; }
    .corner-tr { top: 10px; right: 10px; border-top: 1.5px solid #7ab870; border-right: 1.5px solid #7ab870; }
    .corner-bl { bottom: 10px; left: 10px; border-bottom: 1.5px solid #7ab870; border-left: 1.5px solid #7ab870; }
    .corner-br { bottom: 10px; right: 10px; border-bottom: 1.5px solid #7ab870; border-right: 1.5px solid #7ab870; }
    img.preview { width: 100%; height: 100%; object-fit: cover; display: block; }
    .placeholder-state { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; color: #2a4030; }
    .placeholder-state p { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; }
    .status-bar { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: rgba(20,40,20,0.6); border: 1px solid rgba(120,180,100,0.12); border-top: none; border-radius: 0 0 4px 4px; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #3a5540; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #3a5540; flex-shrink: 0; }
    .dot.analyzing { background: #d4b870; animation: pulse 0.8s infinite; }
    .dot.ready { background: #7ab870; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .controls { display: flex; gap: 10px; margin-top: 16px; }
    button { flex: 1; padding: 18px 12px; font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; border: 1px solid rgba(120,180,100,0.25); border-radius: 2px; cursor: pointer; transition: background 0.15s; background: rgba(20,40,20,0.4); color: #7ab870; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    button:active:not(:disabled) { background: rgba(120,180,100,0.15); }
    button:disabled { opacity: 0.3; cursor: not-allowed; }
    button.primary { background: rgba(100,160,80,0.15); border-color: rgba(120,180,100,0.4); }
    button.primary:active:not(:disabled) { background: rgba(120,180,100,0.25); }
    .result-panel { margin-top: 24px; border: 1px solid rgba(120,180,100,0.15); border-radius: 4px; overflow: hidden; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .result-header { padding: 12px 16px; background: rgba(20,40,20,0.6); border-bottom: 1px solid rgba(120,180,100,0.1); font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: #4a7a50; }
    .result-body { padding: 20px; background: rgba(10,20,10,0.6); line-height: 1.9; font-size: 13px; color: #a8c8a0; white-space: pre-wrap; }
    .result-body strong { color: #c8e0c0; font-weight: 500; }
    .thinking { display: flex; align-items: center; gap: 12px; padding: 20px; background: rgba(10,20,10,0.6); color: #4a7a50; font-size: 11px; letter-spacing: 0.2em; }
    .thinking-dots span { animation: blink 1.4s infinite both; font-size: 20px; line-height: 1; }
    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }
    .error-msg { padding: 16px 20px; background: rgba(80,20,20,0.4); border: 1px solid rgba(160,60,60,0.2); border-radius: 4px; margin-top: 16px; font-size: 11px; color: #c08080; line-height: 1.6; }
    .image-strip { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 0; padding: 12px; background: rgba(10,20,10,0.6); border-top: 1px solid rgba(120,180,100,0.1); }
    .image-strip img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 3px; border: 1px solid rgba(120,180,100,0.15); display: block; }
    .image-strip-label { padding: 8px 16px 4px; background: rgba(10,20,10,0.6); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #3a5540; border-top: 1px solid rgba(120,180,100,0.1); }
    .img-loading { display: flex; align-items: center; justify-content: center; padding: 20px; background: rgba(10,20,10,0.6); font-size: 11px; color: #3a5540; letter-spacing: 0.15em; border-top: 1px solid rgba(120,180,100,0.1); }
    .image-strip img { cursor: pointer; transition: opacity 0.15s, transform 0.15s; }
    .image-strip img:active { opacity: 0.7; transform: scale(0.96); }
    .lightbox-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; touch-action: none; }
    .lightbox-close { position: absolute; top: 16px; right: 20px; background: none; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.7); font-size: 20px; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; flex: unset; padding: 0; letter-spacing: 0; text-transform: none; }
    .lightbox-close:active { background: rgba(255,255,255,0.1); }
    .lightbox-img-wrap { width: 100vw; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .lightbox-img-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; transform-origin: center center; user-select: none; -webkit-user-drag: none; transition: transform 0.1s ease-out; }
    .lightbox-hint { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.3); white-space: nowrap; }
    .setup-banner { margin-top: 16px; padding: 14px 16px; background: rgba(40,40,10,0.5); border: 1px solid rgba(180,160,60,0.25); border-radius: 4px; font-size: 11px; color: #b0a060; line-height: 1.7; }
    .setup-banner a { color: #d4c070; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useCallback } = React;

    // ─── PASTE YOUR CLOUDFLARE WORKER URL HERE ───────────────────────────────
    const WORKER_URL = "https://plant-identifier.dave-carr.workers.dev/";
    // e.g. "https://plant-identifier.yourname.workers.dev"
    // ─────────────────────────────────────────────────────────────────────────

    function LeafIcon({ size = 48, color = "#2a4030" }) {
      return (
        <svg width={size} height={size} viewBox="0 0 64 64" fill="none" style={{color}}>
          <path d="M32 8C32 8 12 20 12 36C12 46.5 21.5 54 32 54C42.5 54 52 46.5 52 36C52 20 32 8 32 8Z" stroke="currentColor" strokeWidth="1.5" fill="none"/>
          <path d="M32 54V30" stroke="currentColor" strokeWidth="1.5"/>
          <path d="M32 42C32 42 22 36 18 28" stroke="currentColor" strokeWidth="1" opacity="0.5"/>
          <path d="M32 36C32 36 42 30 46 22" stroke="currentColor" strokeWidth="1" opacity="0.5"/>
        </svg>
      );
    }

    function App() {
      const cameraInputRef = useRef(null);
      const galleryInputRef = useRef(null);
      const [mode, setMode] = useState("idle");
      const [capturedImage, setCapturedImage] = useState(null);
      const [result, setResult] = useState(null);
      const [error, setError] = useState(null);
      const [plantImages, setPlantImages] = useState([]);
      const [imagesLoading, setImagesLoading] = useState(false);
      const [lightboxSrc, setLightboxSrc] = useState(null);
      const lightboxRef = useRef(null);
      const imgRef = useRef(null);
      const gestureRef = useRef({ scale: 1, lastScale: 1, startDist: 0, startX: 0, startY: 0, tx: 0, ty: 0, lastTx: 0, lastTy: 0, pointers: [] });

      const workerConfigured = WORKER_URL !== "YOUR_WORKER_URL_HERE";

      const handleImage = useCallback((e) => {
        const file = e.target.files[0];
        if (!file) return;
        setResult(null); setError(null);
        const reader = new FileReader();
        reader.onload = (ev) => { setCapturedImage(ev.target.result); setMode("preview"); };
        reader.readAsDataURL(file);
        e.target.value = "";
      }, []);

      const compressImage = (dataUrl) => new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement("canvas");
          const MAX = 1024;
          let w = img.width, h = img.height;
          if (w > h && w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
          else if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
          canvas.width = w; canvas.height = h;
          canvas.getContext("2d").drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL("image/jpeg", 0.8));
        };
        img.src = dataUrl;
      });

      const identify = useCallback(async () => {
        if (!capturedImage) return;
        setMode("analyzing"); setResult(null); setError(null);
        const compressed = await compressImage(capturedImage);
        const base64 = compressed.split(",")[1];
        const mediaType = "image/jpeg";
        try {
          const response = await fetch(WORKER_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1000,
              messages: [{ role: "user", content: [
                { type: "image", source: { type: "base64", media_type: mediaType, data: base64 } },
                { type: "text", text: "You are an expert botanist. Identify the plant in this image and provide:\n\n**Common Name:** [name]\n**Scientific Name:** [genus species]\n**Family:** [plant family]\n**Confidence:** [High / Medium / Low]\n\n**Description:**\n[2-3 sentences about the plant's appearance and key identifying features visible in the image]\n\n**Care Tips:**\n[3-4 practical care tips — sunlight, water, soil, etc.]\n\n**Interesting Fact:**\n[One compelling fact about this plant]\n\nIf there is no plant in the image, or the image is unclear, say so plainly." }
              ]}]
            })
          });
          const data = await response.json();
          if (data.error) throw new Error(data.error.message);
          const text = data.content?.find(b => b.type === "text")?.text || "No result returned.";
          setResult(text); setMode("preview"); fetchPlantImages(text);
        } catch (e) {
          setError("Identification failed: " + (e.message || "Unknown error"));
          setMode("preview");
        }
      }, [capturedImage]);

      const reset = useCallback(() => { setCapturedImage(null); setResult(null); setError(null); setPlantImages([]); setMode("idle"); }, []);

      const fetchPlantImages = useCallback(async (resultText) => {
        // Extract scientific name first, fall back to common name
        const sciMatch = resultText.match(/\*\*Scientific Name:\*\*\s*([^\n]+)/);
        const commonMatch = resultText.match(/\*\*Common Name:\*\*\s*([^\n]+)/);
        const query = (sciMatch?.[1] || commonMatch?.[1] || "").trim();
        if (!query || query.includes("[")) return;
        setImagesLoading(true);
        setPlantImages([]);
        try {
          // Use Wikimedia Commons API — free, no key needed
          const searchUrl = `https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(query)}&prop=pageimages&piprop=thumbnail|original&pithumbsize=400&format=json&origin=*`;
          const r1 = await fetch(searchUrl);
          const d1 = await r1.json();
          const pages = Object.values(d1?.query?.pages || {});
          const imgs = [];
          for (const p of pages) {
            if (p.thumbnail?.source) imgs.push(p.thumbnail.source);
          }
          // Also search Commons for more images
          const commonsUrl = `https://commons.wikimedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query + " plant")}&srnamespace=6&srlimit=6&format=json&origin=*`;
          const r2 = await fetch(commonsUrl);
          const d2 = await r2.json();
          const titles = (d2?.query?.search || []).map(s => s.title.replace("File:", ""));
          for (const title of titles.slice(0, 5)) {
            if (imgs.length >= 3) break;
            const thumbUrl = `https://commons.wikimedia.org/w/api.php?action=query&titles=File:${encodeURIComponent(title)}&prop=imageinfo&iiprop=url&iiurlwidth=400&format=json&origin=*`;
            const r3 = await fetch(thumbUrl);
            const d3 = await r3.json();
            const info = Object.values(d3?.query?.pages || {})[0]?.imageinfo?.[0];
            if (info?.thumburl) imgs.push(info.thumburl);
          }
          setPlantImages(imgs.slice(0, 3));
        } catch(e) { /* silently fail — images are supplementary */ }
        setImagesLoading(false);
      }, []);

      const openLightbox = (src) => {
        const g = gestureRef.current;
        g.scale = 1; g.lastScale = 1; g.tx = 0; g.ty = 0; g.lastTx = 0; g.lastTy = 0; g.pointers = [];
        setLightboxSrc(src);
      };

      const closeLightbox = () => { setLightboxSrc(null); };

      const applyTransform = () => {
        const img = imgRef.current;
        if (!img) return;
        const g = gestureRef.current;
        img.style.transform = `translate(${g.tx}px, ${g.ty}px) scale(${g.scale})`;
      };

      const onPointerDown = (e) => {
        const g = gestureRef.current;
        e.currentTarget.setPointerCapture(e.pointerId);
        g.pointers = [...g.pointers.filter(p => p.id !== e.pointerId), { id: e.pointerId, x: e.clientX, y: e.clientY }];
        if (g.pointers.length === 1) {
          g.startX = e.clientX - g.tx;
          g.startY = e.clientY - g.ty;
        } else if (g.pointers.length === 2) {
          const [p1, p2] = g.pointers;
          g.startDist = Math.hypot(p2.x - p1.x, p2.y - p1.y);
          g.lastScale = g.scale;
        }
      };

      const onPointerMove = (e) => {
        const g = gestureRef.current;
        g.pointers = g.pointers.map(p => p.id === e.pointerId ? { id: e.pointerId, x: e.clientX, y: e.clientY } : p);
        if (g.pointers.length === 1) {
          g.tx = e.clientX - g.startX;
          g.ty = e.clientY - g.startY;
          applyTransform();
        } else if (g.pointers.length === 2) {
          const [p1, p2] = g.pointers;
          const dist = Math.hypot(p2.x - p1.x, p2.y - p1.y);
          g.scale = Math.min(Math.max(g.lastScale * (dist / g.startDist), 1), 6);
          applyTransform();
        }
      };

      const onPointerUp = (e) => {
        const g = gestureRef.current;
        g.pointers = g.pointers.filter(p => p.id !== e.pointerId);
        g.lastScale = g.scale;
        g.lastTx = g.tx; g.lastTy = g.ty;
        // If scale has gone below 1, snap back
        if (g.scale <= 1) { g.scale = 1; g.tx = 0; g.ty = 0; applyTransform(); }
      };

      const onDoubleClick = () => {
        const g = gestureRef.current;
        if (g.scale > 1) { g.scale = 1; g.tx = 0; g.ty = 0; }
        else { g.scale = 2.5; }
        applyTransform();
      };

            const statusLabel = { idle: "Awaiting image", preview: result ? "Identified" : "Ready to analyse", analyzing: "Analysing..." }[mode];
      const dotClass = "dot" + (mode === "analyzing" ? " analyzing" : mode === "preview" ? " ready" : "");
      const formatResult = (text) => text.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");

      return (
        <>
          <input ref={cameraInputRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={handleImage} />
          <input ref={galleryInputRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleImage} />
          <div className="app">
            <header className="header">
              <p className="header-label">Botanical Intelligence</p>
              <h1>Plant <em>Identifier</em></h1>
              <p className="header-sub">Capture · Identify · Discover</p>
            </header>
            <main className="main-card">
              <div className="camera-zone">
                <div className="corner corner-tl"/><div className="corner corner-tr"/>
                <div className="corner corner-bl"/><div className="corner corner-br"/>
                {mode === "idle" && <div className="placeholder-state"><LeafIcon size={64}/><p>No image loaded</p></div>}
                {(mode === "preview" || mode === "analyzing") && capturedImage && <img src={capturedImage} alt="Plant" className="preview"/>}
              </div>
              <div className="status-bar"><div className={dotClass}/><span>{statusLabel}</span></div>
              <div className="controls">
                {mode === "idle" && (<><button className="primary" onClick={() => cameraInputRef.current?.click()}>📷 Camera</button><button onClick={() => galleryInputRef.current?.click()}>🖼 Gallery</button></>)}
                {mode === "preview" && (<><button onClick={reset}>Retake</button><button className="primary" onClick={identify} disabled={!workerConfigured}>Identify Plant</button></>)}
                {mode === "analyzing" && <button disabled>Analysing…</button>}
              </div>
              {!workerConfigured && <div className="setup-banner">⚙ Open <code>index.html</code> in a text editor and replace <code>YOUR_WORKER_URL_HERE</code> with your Cloudflare Worker URL, then re-upload to GitHub.</div>}
              {error && <div className="error-msg">⚠ {error}</div>}
              {mode === "analyzing" && <div className="result-panel"><div className="result-header">🌿 Identifying</div><div className="thinking"><div className="thinking-dots"><span>·</span><span>·</span><span>·</span></div>Consulting botanical knowledge</div></div>}
              {result && <div className="result-panel">
                <div className="result-header">🌿 Identification Complete</div>
                <div className="result-body" dangerouslySetInnerHTML={{__html: formatResult(result)}}/>
                {imagesLoading && <div className="img-loading"><span>Loading reference images…</span></div>}
                {plantImages.length > 0 && (<>
                  <div className="image-strip-label">Reference Images</div>
                  <div className="image-strip">
                    {plantImages.map((src, i) => <img key={i} src={src} alt={"Plant reference " + (i+1)} onError={e => e.target.style.display="none"} onClick={() => openLightbox(src)}/>)}
                  </div>
                </>)}
              </div>}
            </main>
          </div>
          {lightboxSrc && (
            <div className="lightbox-overlay" onClick={closeLightbox}>
              <button className="lightbox-close" onClick={closeLightbox}>✕</button>
              <div className="lightbox-img-wrap"
                onClick={e => e.stopPropagation()}
                onPointerDown={onPointerDown}
                onPointerMove={onPointerMove}
                onPointerUp={onPointerUp}
                onDoubleClick={onDoubleClick}
                style={{touchAction:"none"}}>
                <img ref={imgRef} src={lightboxSrc} alt="Plant enlarged" draggable="false" />
              </div>
              <div className="lightbox-hint">Pinch to zoom · Double-tap to reset · Tap outside to close</div>
            </div>
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
